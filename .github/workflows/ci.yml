name: CI (Debian Bookworm)

on:
  push:
    branches: [main, refactor/test-script]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # GitHub only provides Ubuntu runners
    container:
      image: debian:bookworm-slim

    steps:
      - uses: actions/checkout@v3

      # Install dependencies
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y \
            python3 \
            python3-pip \
            build-essential \
            i2c-tools \
            pigpio \
            git \
            make

      # Install Python dependencies
      - name: Install Python requirements
        run: pip3 install -r requirements.txt

      # Run your Python unified test runner
      - name: Run Python tests
        run: python3 tests/runner.py
